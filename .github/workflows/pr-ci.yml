name: PR CI — tests and failure notification

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: read
  issues: write

concurrency:
  group: pr-ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  test:
    name: Run test suite
    runs-on: ubuntu-latest
    env:
      CI: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests and save output
        # Fail the job when tests fail so downstream "notify" job can detect failure via needs.test.result
        run: |
          set -o pipefail
          # Run tests, tee output to file so we can upload and/or include in PR comment
          npm test --silent 2>&1 | tee test-output.log

      - name: Upload test logs
        uses: actions/upload-artifact@v4
        with:
          name: test-logs
          path: test-output.log

  notify-on-failure:
    name: Post failure comment to PR
    runs-on: ubuntu-latest
    needs: test
    if: needs.test.result == 'failure'
    steps:
      - name: Download test logs
        uses: actions/download-artifact@v4
        with:
          name: test-logs
          path: ./artifacts

      - name: Post failing test comment
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const path = './artifacts/test-output.log';
            let log = '';
            try {
              log = fs.readFileSync(path, 'utf8');
            } catch (err) {
              log = `Could not read test log at ${path}: ${err.message}`;
            }

            // Truncate to avoid extremely large comments (GitHub limits and UX)
            const MAX = 14000;
            let truncated = log;
            let truncatedNote = '';
            if (truncated.length > MAX) {
              truncated = truncated.slice(0, MAX);
              truncatedNote = '\n\n*(truncated — see uploaded artifact for full logs)*';
            }

            const pr = context.payload.pull_request && context.payload.pull_request.number ? context.payload.pull_request.number : process.env.PR_NUMBER;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const body = [
              'Automated CI detected failing tests for this PR.',
              '',
              `Job: \`${process.env.GITHUB_JOB || 'test'}\``,
              `Workflow: \`${process.env.GITHUB_WORKFLOW}\``,
              '',
              'Summary of failing test output:',
              '',
              '```',
              truncated,
              '```',
              truncatedNote,
              '',
              'I uploaded the full test log as an artifact named `test-logs` for this workflow run. Please fix the failures locally and push updates to this branch; I will re-run the checks automatically.',
            ].join('\n');

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: pr,
              body,
            });

  notify-on-success:
    name: Optional success comment (noisy)
    runs-on: ubuntu-latest
    needs: test
    # Commenting on success can be noisy; keep it disabled by default. If you want a success comment, change the condition to `needs.test.result == 'success'`
    if: false
    steps:
      - name: Post success comment
        uses: actions/github-script@v6
        with:
          script: |
            const pr = context.payload.pull_request.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const body = `All CI checks passed for this PR. Great work! 🎉`;
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: pr,
              body,
            });
