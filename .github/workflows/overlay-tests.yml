name: Overlay Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Playwright Overlay Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout derby-scoreboard-display
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Checkout scoreboard (CRG static files)
        uses: actions/checkout@v4
        with:
          repository: rollerderby/scoreboard
          path: scoreboard
          fetch-depth: 1
          sparse-checkout: |
            html
          sparse-checkout-cone-mode: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: cd tests && npm ci

      - name: Install Playwright Chromium
        run: cd tests && npx playwright install --with-deps chromium

      - name: Run Playwright tests
        env:
          CRG_HTML_DIR: ${{ github.workspace }}/scoreboard/html
          EOD_CUSTOM_DIR: ${{ github.workspace }}/custom-overlays/eod-custom-overlay
        run: cd tests && npx playwright test

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/playwright-report/

      - name: Upload test results (screenshots, videos)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: tests/artifacts/
          retention-days: 14

      - name: Upload overlay screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: overlay-screenshots
          path: tests/screenshots/
