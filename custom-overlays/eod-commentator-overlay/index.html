<!DOCTYPE html>
<html>
  <head>
    <title>Commentator Overlay | CRG ScoreBoard</title>
    <script type="text/javascript" src="/external/jquery/jquery.js"></script>
    <script type="text/javascript" src="/json/core.js"></script>
    <link rel="stylesheet" href="/fonts/inter/inter.css" type="text/css" />
    <link rel="stylesheet" href="index.css" type="text/css" />
  </head>
  <body class="preload sbNoConnectionStatus">
    <div id="sb" sbContext="ScoreBoard.CurrentGame" class="CommentatorOverlay">
      <div class="RosterContainer">
        <div class="TeamSection" sbForeach="Team: 1,2: only" sbContext="Team([Team])">
          <div class="TeamHeader">
            <h1 sbDisplay="AlternateName(overlay),Name"></h1>
          </div>

          <div class="RosterGrid">
            <div
              class="SkaterCard"
              sbForeach="Skater:: rosterNumber: resort=RosterNumber"
              sbClass="NoShow: Role: ==='NotInGame'"
              sbAttr="rosterNumber: RosterNumber"
            >
              <div class="SkaterNumber" sbDisplay="RosterNumber: sbToNbspIfEmpty"></div>
              <div class="SkaterName" sbDisplay="Name: sbToNbspIfEmpty"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
